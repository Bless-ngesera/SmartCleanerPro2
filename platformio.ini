; ══════════════════════════════════════════════════════════
; PlatformIO Project Configuration - ESP32-S3 Production
; Smart Cleaner Pro v6.0 - USB Camera + Static IP
; ══════════════════════════════════════════════════════════

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = 
    default
    time
    esp32_exception_decoder

; Upload Settings
upload_speed = 921600

; Build Flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384

; Library Dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.2.1

; Partition Scheme (for PSRAM support)
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

; Flash Settings
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L

; PSRAM Settings
board_build.arduino.psram = enabled
board_upload.flash_size = 16MB