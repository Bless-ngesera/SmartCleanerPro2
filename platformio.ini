[env:esp32s3usbotg]
platform = espressif32
board = esp32s3usbotg
framework = arduino
monitor_speed = 115200
board_build.psram = enabled
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.partitions = huge_app.csv
lib_deps = 
    bblanchon/ArduinoJson@^7.2.1

; ESP32 Built-in Libraries (no need to install separately):
; - WiFi
; - WebServer  
; - HTTPClient
; - HardwareSerial

; Upload settings
upload_speed = 921600
upload_port = COM*  ; Auto-detect (change to specific port if needed)
monitor_port = COM*

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1